name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify and Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Verify repository
        shell: pwsh
        run: .\scripts\verify.ps1

      - name: Package installer
        shell: pwsh
        run: .\scripts\package.ps1 -Configuration Release -OutputPath .\artifacts\ci-package

      - name: Upload installer package
        uses: actions/upload-artifact@v4
        with:
          name: pagemaker365-installer-ci-package
          path: artifacts/ci-package
          if-no-files-found: error
          retention-days: 7
